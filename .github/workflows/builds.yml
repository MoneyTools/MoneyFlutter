name: Flutter Desktop Build

on:
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.1"

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows App
        run: flutter build windows

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mymoney-app-windows
          path: build/windows/x64/runner/Release/**

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies for Linux Build
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ pkg-config libgtk-3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.1"

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Linux App
        run: flutter build linux

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mymoney-app-linux
          path: build/linux/

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.1"

      - name: Install Dependencies
        run: flutter pub get

      - name: Build macOS App (Universal)
        run: flutter build macos

      - name: Create Intel and Apple Silicon Packages
        run: |
          APP_NAME="Runner" # Assuming Runner.app, adjust if different
          UNIVERSAL_APP_PATH="build/macos/Build/Products/Release/${APP_NAME}.app"
          INTEL_APP_PATH="build/macos/Build/Products/Release-Intel/${APP_NAME}.app"
          SILICON_APP_PATH="build/macos/Build/Products/Release-Silicon/${APP_NAME}.app"

          echo "Checking universal app path: ${UNIVERSAL_APP_PATH}"
          if [ ! -d "${UNIVERSAL_APP_PATH}" ]; then
            echo "Error: Universal app not found at ${UNIVERSAL_APP_PATH}"
            ls -R build/macos/Build/Products/Release/
            # Attempt to find the .app directory if APP_NAME was wrong
            FOUND_APP_PATH=$(find build/macos/Build/Products/Release/ -name "*.app" -type d -maxdepth 1)
            if [ -n "${FOUND_APP_PATH}" ] && [ -d "${FOUND_APP_PATH}" ]; then
              echo "Found .app at ${FOUND_APP_PATH}, using it."
              UNIVERSAL_APP_PATH="${FOUND_APP_PATH}"
              APP_NAME=$(basename "${FOUND_APP_PATH}" .app)
              INTEL_APP_PATH="build/macos/Build/Products/Release-Intel/${APP_NAME}.app"
              SILICON_APP_PATH="build/macos/Build/Products/Release-Silicon/${APP_NAME}.app"
            else
              echo "Still cannot find the .app directory. Exiting."
              exit 1
            fi
          fi

          echo "Creating Intel-specific app..."
          mkdir -p "$(dirname "${INTEL_APP_PATH}")"
          ditto --arch x86_64 "${UNIVERSAL_APP_PATH}" "${INTEL_APP_PATH}"

          echo "Zipping Intel app..."
          pushd "$(dirname "${INTEL_APP_PATH}")"
          zip -r "../../../../../mymoney-app-macos-intel.zip" "${APP_NAME}.app"
          popd

          echo "Creating Apple Silicon-specific app..."
          mkdir -p "$(dirname "${SILICON_APP_PATH}")"
          ditto --arch arm64 "${UNIVERSAL_APP_PATH}" "${SILICON_APP_PATH}"

          echo "Zipping Apple Silicon app..."
          pushd "$(dirname "${SILICON_APP_PATH}")"
          zip -r "../../../../../mymoney-app-macos-silicon.zip" "${APP_NAME}.app"
          popd

      - name: Upload macOS Intel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mymoney-app-macos-intel
          path: mymoney-app-macos-intel.zip

      - name: Upload macOS Silicon Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mymoney-app-macos-silicon
          path: mymoney-app-macos-silicon.zip
